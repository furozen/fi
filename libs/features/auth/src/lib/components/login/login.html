<!-- libs/features/auth/src/lib/components/login/login.html -->
<div class="login-page-wrapper">
  <mat-card class="login-card">
    <mat-card-header>
      <mat-card-title>Вход в систему</mat-card-title>
    </mat-card-header>

    <form (submit)="onSubmit($event)">
      <mat-card-content class="form-content">
        <div>
          <mat-form-field >
            <mat-label>Идентификатор / Email</mat-label>
            <input matInput type="text"
                   [formField]="loginForm.email"
                   autocomplete="username"
            />
            <mat-icon matSuffix>person</mat-icon>
            @for (error of loginForm.email().errors(); track error) {
              <mat-error>{{ error.message }}</mat-error>
            }
          </mat-form-field>
        </div>
        <div>
          <mat-form-field>
            <mat-label>Пароль</mat-label>
            <input matInput [type]="hidePassword() ? 'password' : 'text'" [formField]="loginForm.password" autocomplete="current-password"
            />
            <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
              <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
            </button>
            @for (error of loginForm.password().errors(); track error) {
              <mat-error> {{ error.message }}</mat-error>
            }
          </mat-form-field>
        </div>

      </mat-card-content>

      <mat-card-actions class="form-actions">

        <button mat-flat-button color="primary" type="submit"  [disabled]="loginForm().invalid()">
          Войти
        </button>
      </mat-card-actions>
    </form>
  </mat-card>
</div>
