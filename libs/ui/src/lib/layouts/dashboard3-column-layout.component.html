<div class="dashboard-container">
  <mat-toolbar color="primary" class="dashboard-header">
    <button mat-icon-button *ngIf="isMobile" (click)="leftSidenav.toggle()"><mat-icon>menu</mat-icon></button>
    <span>{{title}}</span>
    <span class="spacer"></span>
    <button mat-button routerLink="/">Дашборд</button>
    <button mat-button routerLink="/analytics">Аналитика</button>
    <span class="spacer"></span>
    <button mat-icon-button *ngIf="isMobile" (click)="rightSidenav.toggle()"><mat-icon>tune</mat-icon></button>
  </mat-toolbar>


  <mat-sidenav-container class="sidenav-container">

    <!-- ЛЕВАЯ КОЛОНКА (Класс anim-sidebar) -->
    <mat-sidenav #leftSidenav [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="left-drawer">
      <div class="drawer-content anim-sidebar">
        <router-outlet name="left-sidebar"></router-outlet>
      </div>
    </mat-sidenav>

    <!-- ПРАВАЯ КОЛОНКА (Класс anim-sidebar) -->
    <mat-sidenav #rightSidenav position="end" [mode]="isMobile ? 'over' : 'side'" [opened]="!isMobile" class="right-drawer">
      <div class="drawer-content anim-sidebar">
        <router-outlet name="right-sidebar"></router-outlet>
      </div>
    </mat-sidenav>

    <!-- ЦЕНТРАЛЬНАЯ РАБОЧАЯ ЗОНА (Класс anim-center) -->
    <mat-sidenav-content class="main-workspace">
      <div class="workspace-wrapper anim-center">
        <router-outlet></router-outlet>
      </div>
    </mat-sidenav-content>

  </mat-sidenav-container>
</div>
